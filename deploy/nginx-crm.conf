server {
    listen 3030 ssl;
    server_name dev.ssd26.srv08.ru;

    ssl_certificate     /etc/letsencrypt/live/dev.ssd26.srv08.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.ssd26.srv08.ru/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3030;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTP → HTTPS redirect
server {
    listen 3030;
    server_name dev.ssd26.srv08.ru;
    return 301 https://$server_name$request_uri;
}